apiVersion: apps/v1
kind: Deployment
metadata:
  name: rahiapp-deployment

spec:
  replicas: 4

  selector:
    matchLabels:
      app: rahiapp

  template:
    metadata:
      labels:
        app: rahiapp

    spec:
      containers:
        - name: rahiapp
          image: rahiregistry.azurecr.io/rahi-app-image:IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 8082

