
name: Build and Push to ACR

on:
  push:
    branches:
      - "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: rahiregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: listFilesInBugsSpace
        run: ls -R

      - name: Replace image tag in deployment
        run: |
          sed -i "s/IMAGE_TAG_PLACEHOLDER/${{ github.sha }}/g" k8s/deployment.yaml

      - name: Build and push Docker image
        run: |
          docker build -t rahiregistry.azurecr.io/rahi-app-image:${{ github.sha }} .
          docker push rahiregistry.azurecr.io/rahi-app-image:${{ github.sha }}

      # -------------------------------
      # AKS DEPLOYMENT START
      # -------------------------------

      # 8. Azure Login
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 9. Set AKS context
      - name: Set AKS Context
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: RahiCluster
          resource-group: rahi-resource

      # 10. Deploy to AKS
      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml